name: Build and Deploy to S3

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build-only

      - name: Deploy to OVHcloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: rbx
        run: aws s3 sync dist/ s3://erwan-leboucher.dev --delete --acl public-read --endpoint-url https://s3.rbx.io.cloud.ovh.net
