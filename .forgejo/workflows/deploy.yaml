name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: default
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to OVHcloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: rbx
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          ./aws/install
          aws s3 sync dist/ s3://erwanleboucher.dev --delete --acl public-read --endpoint-url https://s3.rbx.io.cloud.ovh.net --exclude ".well-known/openpgpkey/hu/*" --exclude ".well-known/openpgpkey/*/hu/*"
          aws s3 sync dist/.well-known/openpgpkey/ s3://erwanleboucher.dev/.well-known/openpgpkey/ --acl public-read --endpoint-url https://s3.rbx.io.cloud.ovh.net --content-type application/octet-stream
