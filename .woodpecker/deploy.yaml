---
clone:
  git:
    image: woodpeckerci/plugin-git@sha256:8995e4745cf57dcee659db94d43598fd181b1b370671db2c9ccf7b0b2a8f31c8
    settings:
      skip-verify: true

when:
  - branch: master
    event: [push, manual]

steps:
  - name: Build
    image: codeberg.org/woodpecker-plugins/node-pm@sha256:bff3ee2d7492e89a0dfbe6ee4c7d5ce636108cd973c0c355269f681e8dd8a196
    settings:
      run: build
      frozen_lockfile: true

  - name: Deploy to OVHcloud S3
    image: amazon/aws-cli:latest@sha256:276a192679356eba79a14009edfaff1254dd9cf41536156b8c0284ae63d80f8c
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: OVH_S3_ACCESS_KEY
      AWS_SECRET_ACCESS_KEY:
        from_secret: OVH_S3_SECRET_KEY
      AWS_DEFAULT_REGION: rbx
    commands:
      - aws s3 sync dist/ s3://erwanleboucher.dev --delete --acl public-read --endpoint-url https://s3.rbx.io.cloud.ovh.net
