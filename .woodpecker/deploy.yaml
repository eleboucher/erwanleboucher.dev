---
clone:
  git:
    image: woodpeckerci/plugin-git@sha256:1e536c0da16f8cbb35e870fb3d75fde45c85c7239225fea2209cc6990ba330e4
    settings:
      skip-verify: true

when:
  - branch: master
    event: [push, manual]

steps:
  - name: Build
    image: codeberg.org/woodpecker-plugins/node-pm@sha256:bff3ee2d7492e89a0dfbe6ee4c7d5ce636108cd973c0c355269f681e8dd8a196
    settings:
      run: build
      frozen_lockfile: true

  - name: Deploy to OVHcloud S3
    image: amazon/aws-cli:latest@sha256:6cabf032082435fe7c6e426fe0870f8b50c7382678b351119cdc283f161561a6
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: OVH_S3_ACCESS_KEY
      AWS_SECRET_ACCESS_KEY:
        from_secret: OVH_S3_SECRET_KEY
      AWS_DEFAULT_REGION: rbx
    commands:
      - aws s3 sync dist/ s3://erwanleboucher.dev --delete --acl public-read --endpoint-url https://s3.rbx.io.cloud.ovh.net
